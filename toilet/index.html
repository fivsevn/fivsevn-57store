<!DOCTYPE html>
<html lang=”zh-CN“>
<head>
  <meta charset=”UTF-8“ />
  <meta name=”viewport“ content=”width=device-width, initial-scale=1.0“ />
  <title>57store / toilet</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #050505;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .scene {
      display: block;
      width: 100%;
      height: auto;
    }

    .dialog {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      color: #d8d8d8;
      padding: 18px 20px 24px;
      min-height: 140px;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .dialog.show {
      opacity: 1;
    }

    .time {
      display: block;
      color: #8a8a8a;
      font-size: 20px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .line {
      font-size: 32px;
      line-height: 1.4;
      letter-spacing: 1px;
    }

    .hint {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #9a9a9a;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <main class=”page“ id=”page“>
    <div class=”hint“>tap</div>

    <img
      class=”scene“
      src=”./assets/toilet-test002.png“
      alt=”toilet scene“
    />

    <div class=”dialog“ id=”dialog“>
      <span class=”time“>5:57...</span>
      <div class=”line“>先扫那坨。</div>
    </div>
  </main>

  <script>
    const page = document.getElementById(”page“);
    const dialog = document.getElementById(”dialog“);

    let hideTimer = null;

    page.addEventListener(”click“, () => {
      dialog.classList.add(”show“);

      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        dialog.classList.remove(”show“);
      }, 2000);
    });
  </script>
</body>
</html>
