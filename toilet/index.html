<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>57store / toilet</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #050505;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .hint {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #9a9a9a;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      z-index: 3;
    }

    .scene-wrap {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #000;
      position: relative;
    }

    .scene {
      display: block;
      width: 100%;
      height: auto;
    }

    .img-error {
      display: none;
      width: 100%;
      min-height: 100vh;
      color: #777;
      padding: 24px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .dialog {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.96);
      color: #b7d46a;
      padding: 18px 20px 24px;
      min-height: 140px;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      z-index: 2;
    }

    .dialog.show {
      opacity: 1;
    }

    .time {
      display: block;
      color: #b7d46a;
      font-size: 20px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .line {
      font-size: 32px;
      line-height: 1.4;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <main class="page" id="page">
    <div class="hint">点击继续</div>

    <div class="scene-wrap">
      <img
        class="scene"
        id="scene"
        src="./assets/toilet-test003.png"
        alt="toilet scene"
      />
      <div class="img-error" id="imgError"></div>
    </div>

    <div class="dialog" id="dialog">
      <span class="time">5:57...</span>
      <div class="line">先扫那坨。</div>
    </div>
  </main>

  <script>
    const page = document.getElementById("page");
    const dialog = document.getElementById("dialog");
    const scene = document.getElementById("scene");
    const imgError = document.getElementById("imgError");

    let hideTimer = null;

    page.addEventListener("click", () => {
      dialog.classList.add("show");

      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        dialog.classList.remove("show");
      }, 2000);
    });

    scene.addEventListener("error", () => {
      scene.style.display = "none";
      imgError.style.display = "block";
      imgError.textContent =
        "图片加载失败。\n\n请检查：\n1. 路径是否正确\n2. 是否真的存在 ./assets/toilet-test003.png\n3. 文件名大小写是否一致\n4. 图片有没有成功上传到服务器";
    });
  </script>
</body>
</html>
