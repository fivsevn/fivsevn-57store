<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>57store / toilet</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .scene-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    .scene {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .hint {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      backdrop-filter: blur(2px);
    }

    .dialog {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4;

      background: rgba(0, 0, 0, 0.96);
      color: #b7d46a;

      padding: 22px 24px calc(28px + env(safe-area-inset-bottom));
      min-height: 180px;

      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }

    .dialog.show {
      opacity: 1;
      transform: translateY(0);
    }

    .time {
      display: block;
      margin-bottom: 14px;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 2px;
      color: #b7d46a;
    }

    .line {
      font-size: 44px;
      line-height: 1.25;
      letter-spacing: 1px;
      color: #b7d46a;
      word-break: break-word;
    }

    .img-error {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 5;
      padding: 24px;
      color: #888;
      background: #000;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 430px) {
      .dialog {
        min-height: 165px;
        padding: 18px 20px calc(24px + env(safe-area-inset-bottom));
      }

      .time {
        font-size: 24px;
      }

      .line {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page" id="page">
    <div class="scene-wrap">
      <img
        class="scene"
        id="scene"
        src="./assets/toilet-test003.png"
        alt="toilet scene"
      />
      <div class="img-error" id="imgError"></div>
    </div>

    <div class="hint">点击继续</div>

    <div class="dialog show" id="dialog">
      <span class="time">5:57...</span>
      <div class="line">先扫那坨。</div>
    </div>
  </main>

  <script>
    const page = document.getElementById("page");
    const dialog = document.getElementById("dialog");
    const scene = document.getElementById("scene");
    const imgError = document.getElementById("imgError");

    let visible = true;

    page.addEventListener("click", () => {
      visible = !visible;
      dialog.classList.toggle("show", visible);
    });

    scene.addEventListener("error", () => {
      scene.style.display = "none";
      imgError.style.display = "block";
      imgError.textContent =
        "图片加载失败。\n\n请检查：\n1. 路径是否正确\n2. 是否真的存在 ./assets/toilet-test003.png\n3. 文件名大小写是否一致\n4. 图片有没有成功上传到服务器";
    });
  </script>
</body>
</html>
