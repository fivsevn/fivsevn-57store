<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>57store / toilet</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#000;
font-family:monospace;
}

body{
display:flex;
justify-content:center;
}

.page{
position:relative;
width:100%;
max-width:430px;
height:100dvh;
overflow:hidden;
background:#000;
}

.scene{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
image-rendering:pixelated;
}

/* 提示 */
.hint{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,0.35);
color:rgba(255,255,255,0.7);
padding:6px 10px;
border-radius:8px;
font-size:12px;
z-index:3;
}

/* 对话框 */
.dialog{

position:absolute;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,0.55);   /* 半透明 */

color:#b7d46a;

padding:22px 24px calc(30px + env(safe-area-inset-bottom));

backdrop-filter:blur(6px);

z-index:4;

}

/* 时间 */

.time{
display:block;
font-size:26px;
margin-bottom:12px;
letter-spacing:2px;
}

/* 文本 */

.line{
font-size:42px;
line-height:1.25;
}

</style>
</head>

<body>

<main class="page" id="page">

<img
class="scene"
src="./assets/toilet-test003.png"
alt="scene"
/>

<div class="hint">点击继续</div>

<div class="dialog">

<span class="time" id="time"></span>

<div class="line" id="line"></div>

</div>

</main>

<script>

const script = [

{time:"5:57...",text:"先扫那坨"},
{time:"",text:"马桶塞呢..."},
{time:"",text:"先扫那坨"}

];

let index=0;

const timeEl=document.getElementById("time");
const lineEl=document.getElementById("line");

function render(){

const s=script[index];

timeEl.textContent=s.time;
lineEl.textContent=s.text;

}

render();

document.getElementById("page").addEventListener("click",()=>{

index++;

if(index>=script.length){

index=0;

}

render();

});

</script>

</body>
</html>
